<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>
  <header>
    <h1>Tic-Tac-Toe</h1>
  </header>
  <main class="main-container">

    <form action="#">
      <div class="player-one">
        <label for="player-one-name">Player One Name</label>
        <input type="text" name="player-one-name" id="player-one-name" value="Player One">
      </div>
      <div class="player-two">
        <label for="player-two-name">Player Two Name</label>
        <input type="text" name="player-two-name" id="player-two-name" value="Player Two">
      </div>
      <button type="submit">Start Game</button>
    </form>

    <div class="scores-container">
      <div class="player-one-score">
        <span>Placeholder for player one's name</span>
        <span>Placeholder for player one's score</span>
      </div>
      <div class="player-two-score">
        <span>Placeholder for player two's name</span>
        <span>Placeholder for player two's score</span>
      </div>
    </div>

    <div class="result-declaration">
      <span></span>
    </div>

    <div class="cells-container">
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
    </div>

    <button class="reset-button">Reset</button>

  </main>
</body>

</html>
